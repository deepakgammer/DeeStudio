<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Our Projects — DeeStudio</title>

  <!-- Modern Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  
  <!-- Three.js for 3D Background -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root {
      --bg: #050510;
      --neon-blue: #00d2ff;
      --neon-purple: #9d00ff;
      --text-main: #f0f4f8;
      --text-muted: #8b9bb4;
      --glass-bg: rgba(15, 15, 30, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    #webgl-container {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1; pointer-events: none;
    }

    /* Glassmorphism Navigation */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.5rem 5%; background: rgba(5, 5, 16, 0.3);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--glass-border);
      transition: all 0.3s ease;
    }
    
    .nav-brand {
      display: flex; align-items: center; gap: 1rem; text-decoration: none;
    }
    .nav-brand h1 {
      font-weight: 800; font-size: 1.5rem;
      background: linear-gradient(90deg, var(--text-main), var(--neon-blue));
      background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      color: var(--text-main); text-decoration: none; font-weight: 600;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }

    /* Page Content */
    .wrap {
      padding: 10rem 5% 5rem;
      max-width: 1400px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      margin-bottom: 4rem;
    }

    h1.page-title {
      font-size: 4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #fff, var(--neon-blue), var(--neon-purple));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.3));
    }

    p.subtitle {
      font-size: 1.2rem;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Grid Layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 2.5rem;
    }

    /* 3D Glass Cards */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2.5rem;
      color: #fff;
      display: flex;
      flex-direction: column;
      transform-style: preserve-3d;
      transition: transform 0.4s ease, border-color 0.4s ease;
      position: relative;
    }

    .card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at top left, rgba(0,210,255,0.1), transparent 70%);
      border-radius: 20px; pointer-events: none;
    }

    .card:hover {
      transform: translateY(-10px) translateZ(20px) scale(1.02);
      border-color: rgba(0, 210, 255, 0.4);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 25px rgba(157, 0, 255, 0.2);
      z-index: 10;
    }

    .card h3 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
    .meta { font-size: 0.85rem; color: var(--neon-blue); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 1rem; font-weight: 800; }
    .card p { color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem; flex: 1; }

    .actions { display: flex; gap: 1rem; margin-top: auto; }
    
    .btn {
      padding: 0.8rem 1.5rem; border-radius: 10px; text-decoration: none; font-weight: 600;
      transition: all 0.3s; font-size: 0.95rem; border: none; cursor: pointer; text-align: center;
      flex: 1; display: inline-block;
    }
    
    .btn-primary { background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); color: #fff; }
    .btn-primary:hover { box-shadow: 0 5px 20px rgba(0,210,255,0.4); transform: translateY(-3px); }
    
    .btn-outline { background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); }
    .btn-outline:hover { border-color: var(--neon-blue); color: var(--neon-blue); transform: translateY(-3px); }

    footer { text-align: center; padding: 3rem; margin-top: auto; color: var(--text-muted); border-top: 1px solid var(--glass-border); }

    .hamburger { display: none; flex-direction: column; gap: 6px; cursor: pointer; z-index: 101; }
    .hamburger span { width: 30px; height: 3px; background: var(--text-main); border-radius: 5px; transition: transform 0.3s, opacity 0.3s; }
    .hamburger.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

    @media(max-width: 768px) {
      .hamburger { display: flex; }
      .nav-links {
        position: fixed; top: 0; right: -100%; height: 100vh; width: 100%;
        background: rgba(5, 5, 16, 0.98); backdrop-filter: blur(20px);
        flex-direction: column; justify-content: center; align-items: center;
        transition: right 0.4s cubic-bezier(0.77, 0.2, 0.05, 1); padding: 2rem;
      }
      .nav-links.active { right: 0; }
      .nav-links li { margin: 1.5rem 0; }
      .nav-links a { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; }
      h1.page-title { font-size: 2.8rem; margin-top: 2rem; }
      .wrap { padding: 8rem 1.5rem 4rem; }
      .nav-brand h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <div id="webgl-container"></div>

  <nav>
    <a href="index.html" class="nav-brand">
      <h1>DEESTUDIO</h1>
    </a>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#lyra">Lyra AI</a></li>
      <li><a href="projects.html" style="color:var(--neon-blue)">Projects</a></li>
    </ul>
  </nav>

  <div class="wrap">
    <header>
      <h1 class="page-title">Innovation Gallery</h1>
      <p class="subtitle">A curated collection of our latest functional prototypes, scalable platforms, and immersive digital experiences.</p>
    </header>

    <div class="grid" id="projectsGrid"></div>
  </div>

  <footer>© 2026 DeeStudio. All rights reserved.</footer>

  <script>
    // --- Mobile Menu Toggle ---
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');
    if (hamburger && navLinks) {
      hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('active');
        navLinks.classList.toggle('active');
      });
      document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', () => {
          hamburger.classList.remove('active');
          navLinks.classList.remove('active');
        });
      });
    }

    // Projects Data
    const PROJECTS = [
      { id: 'lyra', title: 'Lyra App', desc: 'Next-generation AI personal assistant that automates workflows and learns your unique lifestyle. Complete native Android experience.', tags: ['app', 'ai', 'android'], url: 'index.html#lyra' },
      { id: 1, title: 'Princess Collection', desc: 'A sophisticated fashion e-commerce storefront delivering premium shopping experiences with dynamic catalogs and seamless filtration capabilities.', tags: ['web', 'ecommerce'], url: 'https://princesscollection.it.com' },
      { id: 2, title: 'L2D Finserv', desc: 'Secure enterprise financial portal architected for streamlined client lead generation and data integrity across B2B interactions.', tags: ['web', 'fintech'], url: 'https://l2dfinserv.it.com' },
      { id: 3, title: 'DeeCryptor', desc: 'Advanced steganography utility converting sensitive text strings into encrypted pixel arrays using browser-native Canvas + AES algorithms.', tags: ['tool', 'crypto'], url: 'https://deecryptor.onrender.com' },
      { id: 4, title: 'Perlyn Beauty', desc: 'End-to-end commercial beauty marketplace integrating Supabase BaaS, dynamic discounting engines, and the PhonePe V2 payments gateway.', tags: ['full-stack', 'ecommerce'], url: 'https://www.perlynbeauty.co' }
    ];

    const grid = document.getElementById('projectsGrid');
    PROJECTS.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h3>${p.title}</h3>
        <div class="meta">${p.tags.join(' • ')}</div>
        <p>${p.desc}</p>
        <div class="actions">
          <a class="btn btn-primary" href="${p.url}" target="_blank" rel="noreferrer">Launch</a>
          <a class="btn btn-outline" href="details.html?id=${p.id}">View Specs</a>
        </div>
      `;
      grid.appendChild(card);
    });

    // Interactive Tilt on Cards
    document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left; // x pos within the element
            const y = e.clientY - rect.top;  // y pos within the element
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * -8;
            const rotateY = ((x - centerX) / centerX) * 8;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
        });

        card.addEventListener('mouseleave', () => {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            card.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)';
        });

        card.addEventListener('mouseenter', () => {
            card.style.transition = 'none'; // removing transition to follow mouse directly
        });
    });

    // Three.js Background Script
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('webgl-container').appendChild(renderer.domElement);

    const geo = new THREE.BufferGeometry();
    const count = 1000;
    const pos = new Float32Array(count * 3);
    for(let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * 800;
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    
    const mat = new THREE.PointsMaterial({ size: 2, color: 0x9d00ff, opacity: 0.6, transparent: true, blending: THREE.AdditiveBlending });
    const mesh = new THREE.Points(geo, mat);
    scene.add(mesh);
    camera.position.z = 300;

    let mx = 0, my = 0;
    document.addEventListener('mousemove', (e) => {
        mx = (e.clientX - window.innerWidth/2) * 0.1;
        my = (e.clientY - window.innerHeight/2) * 0.1;
    });

    function animate() {
        requestAnimationFrame(animate);
        mesh.rotation.y += 0.001;
        camera.position.x += (mx - camera.position.x) * 0.05;
        camera.position.y += (-my - camera.position.y) * 0.05;
        camera.lookAt(scene.position);
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener('scroll', () => {
      const nav = document.querySelector('nav');
      if (window.scrollY > 50) {
        nav.style.background = 'rgba(5, 5, 16, 0.8)';
        nav.style.borderBottom = '1px solid var(--neon-blue)';
      } else {
        nav.style.background = 'rgba(5, 5, 16, 0.3)';
        nav.style.borderBottom = '1px solid var(--glass-border)';
      }
    });
  </script>
</body>
</html>
